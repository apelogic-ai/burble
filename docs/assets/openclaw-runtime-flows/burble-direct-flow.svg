<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="920" viewBox="0 0 1440 920" role="img" aria-labelledby="title desc">
  <title id="title">Burble direct runtime flow</title>
  <desc id="desc">Burble sends planning turns directly to the model provider. Burble executes MCP tools and sends a second direct provider turn when needed. OpenClaw agent bootstrap is skipped.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#263238"/>
    </marker>
    <style>
      .bg { fill: #f8f7fb; }
      .title { font: 700 34px Arial, sans-serif; fill: #172026; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #4b5b64; }
      .laneTitle { font: 700 17px Arial, sans-serif; fill: #3d4d55; }
      .label { font: 700 18px Arial, sans-serif; fill: #172026; }
      .small { font: 400 15px Arial, sans-serif; fill: #34444d; }
      .tiny { font: 400 13px Arial, sans-serif; fill: #52636d; }
      .box { fill: #ffffff; stroke: #a9b5bc; stroke-width: 2; rx: 8; }
      .burble { fill: #eef8f1; stroke: #3c9151; }
      .direct { fill: #f2edff; stroke: #7b5cc7; }
      .provider { fill: #fcecef; stroke: #b94f61; }
      .mcp { fill: #edf7f8; stroke: #2f8a94; }
      .skip { fill: #f1f3f5; stroke: #9aa8af; stroke-dasharray: 8 6; }
      .line { fill: none; stroke: #263238; stroke-width: 2.5; marker-end: url(#arrow); }
      .return { fill: none; stroke: #56656d; stroke-width: 2.2; stroke-dasharray: 8 6; marker-end: url(#arrow); }
      .lane { fill: #ffffff; stroke: #d3d9dd; stroke-width: 1.5; rx: 10; }
      .note { fill: #fffde8; stroke: #c0a63a; stroke-width: 1.5; rx: 8; }
    </style>
  </defs>
  <rect class="bg" width="1440" height="920"/>
  <text class="title" x="70" y="70">Burble direct path</text>
  <text class="subtitle" x="70" y="104">OPENCLAW_NEMOCLAW_ENGINE=burble-direct. Burble owns planning prompts and calls the provider directly.</text>

  <rect class="lane" x="55" y="145" width="360" height="610"/>
  <text class="laneTitle" x="80" y="178">Burble runtime container</text>
  <rect class="lane" x="455" y="145" width="300" height="610"/>
  <text class="laneTitle" x="480" y="178">Provider</text>
  <rect class="lane" x="795" y="145" width="285" height="610"/>
  <text class="laneTitle" x="820" y="178">Burble MCP gateway</text>
  <rect class="lane" x="1120" y="145" width="265" height="610"/>
  <text class="laneTitle" x="1145" y="178">OpenClaw runtime</text>

  <rect class="box burble" x="100" y="225" width="250" height="92"/>
  <text class="label" x="130" y="263">Slack request</text>
  <text class="small" x="130" y="291">POST /runs</text>

  <rect class="box direct" x="100" y="380" width="250" height="128"/>
  <text class="label" x="130" y="418">Burble direct planner</text>
  <text class="small" x="130" y="448">Build prompt with skills,</text>
  <text class="small" x="130" y="472">catalog, context, results</text>
  <text class="small" x="130" y="496">No OpenClaw native tools</text>

  <rect class="box provider" x="500" y="390" width="210" height="108"/>
  <text class="label" x="530" y="428">LLM provider</text>
  <text class="small" x="530" y="458">OpenAI, Anthropic,</text>
  <text class="small" x="530" y="482">or Ollama compatible</text>

  <rect class="box mcp" x="835" y="380" width="210" height="118"/>
  <text class="label" x="865" y="418">MCP tools</text>
  <text class="small" x="865" y="448">Jira, GitHub,</text>
  <text class="small" x="865" y="472">catalog tools</text>

  <rect class="box skip" x="1150" y="345" width="205" height="172"/>
  <text class="label" x="1180" y="385">Skipped</text>
  <text class="small" x="1180" y="415">Gateway process</text>
  <text class="small" x="1180" y="439">Agent bootstrap</text>
  <text class="small" x="1180" y="463">OpenClaw read tool</text>
  <text class="small" x="1180" y="487">Identity bootstrap</text>

  <rect class="box burble" x="100" y="610" width="250" height="100"/>
  <text class="label" x="130" y="648">Slack response</text>
  <text class="small" x="130" y="678">normalized Burble event</text>

  <path class="line" d="M225 317 V380"/>
  <path class="line" d="M350 438 H500"/>
  <path class="return" d="M500 485 C430 565, 350 575, 225 508"/>
  <path class="line" d="M350 455 C500 555, 700 565, 835 455"/>
  <path class="return" d="M835 420 C650 315, 470 325, 350 400"/>
  <path class="line" d="M350 475 H500"/>
  <path class="return" d="M500 420 C390 285, 250 450, 225 610"/>
  <path class="line" d="M225 508 V610"/>

  <text class="tiny" x="380" y="426">direct planning turn 1</text>
  <text class="tiny" x="585" y="555">tool_call JSON returns to Burble</text>
  <text class="tiny" x="600" y="620">tool result goes into next direct prompt</text>
  <text class="tiny" x="380" y="492">direct planning turn 2 if needed</text>

  <rect class="note" x="100" y="805" width="1255" height="58"/>
  <text class="small" x="130" y="840">Expected logs include "Burble direct model start" and "Burble direct model finish"; OpenClaw Gateway and agent logs should be absent for this path.</text>
</svg>
