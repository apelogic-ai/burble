name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test:
    name: Typecheck and test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.21"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check whitespace
        run: git diff --check

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Check release metadata
        run: bun run release:check

  runtime-readiness:
    name: Runtime readiness E2E
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 90
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.21"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create runtime Docker network
        run: |
          docker network rm burble-runtime-e2e || true
          docker network create burble-runtime-e2e

      - name: Build OpenClaw/NemoClaw CLI runtime image
        run: |
          docker build \
            -t burble-openclaw-nemoclaw-openclaw-cli:dev \
            -f runtimes/openclaw-nemoclaw/Dockerfile.openclaw-cli \
            .

      - name: Build Hermes runtime image
        run: |
          docker build \
            -t burble-nemo-hermes:dev \
            -f runtimes/nemo-hermes/Dockerfile \
            .

      - name: Build Burble Native runtime image
        run: |
          docker build \
            -t burble-native-runtime:dev \
            -f runtimes/burble-native/Dockerfile \
            .

      - name: Run runtime readiness E2E
        env:
          BURBLE_E2E_RUNTIMES: "1"
          BURBLE_E2E_CONFORMANCE: "1"
          BURBLE_E2E_RUNTIME_ENGINES: openclaw,hermes
          BURBLE_E2E_OPENCLAW_IMAGE: burble-openclaw-nemoclaw-openclaw-cli:dev
          BURBLE_E2E_DOCKER_NETWORK: burble-runtime-e2e
          BURBLE_E2E_RUNTIME_DATA_ROOT: /tmp/burble-runtime-e2e
          BURBLE_E2E_HEALTH_ATTEMPTS: "180"
          BURBLE_E2E_HEALTH_INTERVAL_MS: "1000"
          BURBLE_E2E_TIMEOUT_MS: "240000"
          HERMES_GATEWAY_COMMAND: "python -m http.server 8766"
        run: bun test tests/e2e/runtime-readiness.test.ts

      - name: Run Burble Native runtime boot smoke E2E
        env:
          BURBLE_E2E_RUNTIME_BOOT_SMOKE: "1"
          BURBLE_E2E_RUNTIME_ENGINES: burble-native
          BURBLE_E2E_BURBLE_NATIVE_IMAGE: burble-native-runtime:dev
          BURBLE_E2E_DOCKER_NETWORK: burble-runtime-e2e
          BURBLE_E2E_RUNTIME_DATA_ROOT: /tmp/burble-runtime-e2e
          BURBLE_E2E_HEALTH_ATTEMPTS: "60"
          BURBLE_E2E_HEALTH_INTERVAL_MS: "1000"
          BURBLE_E2E_TIMEOUT_MS: "120000"
          BURBLE_RUNTIME_CONTRACT_PROBE: "1"
        run: bun test tests/e2e/runtime-readiness.test.ts

      - name: Run Burble Native model and tool boundary E2E
        env:
          BURBLE_E2E_BURBLE_NATIVE_BOUNDARY_SMOKE: "1"
          BURBLE_E2E_BURBLE_NATIVE_IMAGE: burble-native-runtime:dev
          BURBLE_E2E_DOCKER_NETWORK: burble-runtime-e2e
          BURBLE_E2E_RUNTIME_DATA_ROOT: /tmp/burble-runtime-e2e
          BURBLE_E2E_HEALTH_ATTEMPTS: "60"
          BURBLE_E2E_HEALTH_INTERVAL_MS: "1000"
          BURBLE_E2E_TIMEOUT_MS: "120000"
        run: bun test tests/e2e/runtime-readiness.test.ts

      - name: Clean up runtime containers
        if: always()
        run: |
          docker ps -aq --filter "name=burble-rt-" | xargs -r docker rm -f
          docker network rm burble-runtime-e2e || true

  openshell-runtime-e2e:
    name: OpenShell runtime E2E
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 90
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.21"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build OpenClaw/NemoClaw CLI runtime image
        run: |
          docker build \
            -t burble-openclaw-nemoclaw-openclaw-cli:dev \
            -f runtimes/openclaw-nemoclaw/Dockerfile.openclaw-cli \
            .

      - name: Build Hermes runtime image
        run: |
          docker build \
            -t burble-nemo-hermes:dev \
            -f runtimes/nemo-hermes/Dockerfile \
            .

      - name: Start OpenShell testbed
        env:
          OPENSHELL_TESTBED_PORT: "8080"
          OPENSHELL_TESTBED_HEALTH_PORT: "8081"
          AGENT_RUNTIME_SANDBOX_TRANSPORT: cli
        run: bun run testbed:up

      - name: Wait for OpenShell gateway
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8081/healthz >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          docker compose -f deploy/testbed/compose/docker-compose.yml logs --no-color openshell
          exit 1

      - name: Verify app OpenShell CLI dependencies
        run: |
          docker compose -f deploy/testbed/compose/docker-compose.yml exec -T burble-app-testbed sh -lc '
            test -x /opt/openshell-cli/openshell
            command -v ssh >/dev/null
            /opt/openshell-cli/openshell --gateway-endpoint http://openshell:8080 sandbox list >/dev/null
          '

      - name: Run Hermes through OpenShell
        env:
          BURBLE_E2E_OPENSHELL: "1"
          BURBLE_E2E_OPENSHELL_RUN: "1"
          BURBLE_E2E_RUNTIME_ENGINE: hermes
          BURBLE_E2E_RUNTIME_IMAGE: burble-nemo-hermes:dev
          BURBLE_E2E_HEALTH_ATTEMPTS: "180"
          BURBLE_E2E_HEALTH_INTERVAL_MS: "1000"
          BURBLE_E2E_TIMEOUT_MS: "240000"
          AGENT_MODE: deterministic
          AGENT_RUNTIME_FACTORY: sandbox
          AGENT_RUNTIME_SANDBOX_URL: http://127.0.0.1:8080
          AGENT_RUNTIME_SANDBOX_TRANSPORT: cli
          AGENT_RUNTIME_OPENSHELL_CLI_BIN: ${{ github.workspace }}/deploy/testbed/.cache/openshell-linux
          AGENT_RUNTIME_OPENSHELL_DIAL_HOST: 127.0.0.1:8080
          AGENT_RUNTIME_SANDBOX_START_COMMAND: '["python","/runtime/entrypoint.py"]'
          BURBLE_RUNTIME_CONTRACT_PROBE: "1"
        run: bun test tests/e2e/openshell-sandbox-runtime.test.ts

      - name: Run OpenClaw through OpenShell
        env:
          BURBLE_E2E_OPENSHELL: "1"
          BURBLE_E2E_OPENSHELL_RUN: "1"
          BURBLE_E2E_RUNTIME_ENGINE: openclaw
          BURBLE_E2E_RUNTIME_IMAGE: burble-openclaw-nemoclaw-openclaw-cli:dev
          BURBLE_E2E_HEALTH_ATTEMPTS: "180"
          BURBLE_E2E_HEALTH_INTERVAL_MS: "1000"
          BURBLE_E2E_TIMEOUT_MS: "240000"
          AGENT_MODE: deterministic
          AGENT_RUNTIME_FACTORY: sandbox
          AGENT_RUNTIME_SANDBOX_URL: http://127.0.0.1:8080
          AGENT_RUNTIME_SANDBOX_TRANSPORT: cli
          AGENT_RUNTIME_OPENSHELL_CLI_BIN: ${{ github.workspace }}/deploy/testbed/.cache/openshell-linux
          AGENT_RUNTIME_OPENSHELL_DIAL_HOST: 127.0.0.1:8080
          AGENT_RUNTIME_SANDBOX_START_COMMAND: '["sh","-lc","cd /runtime && exec bun src/index.ts"]'
          BURBLE_RUNTIME_CONTRACT_PROBE: "1"
        run: bun test tests/e2e/openshell-sandbox-runtime.test.ts

      - name: Dump OpenShell testbed logs
        if: failure()
        run: docker compose -f deploy/testbed/compose/docker-compose.yml logs --no-color --tail=300

      - name: Clean up OpenShell testbed
        if: always()
        run: |
          docker ps -aq --filter "name=openshell-b-" | xargs -r docker rm -f
          bun run testbed:down || true
