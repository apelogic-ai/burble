provider: web
tools:
  - name: web_search
    alias: web.search
    aliases:
      - web.searchNews
      - web_search_news
    implementation: search
    title: Web search
    description: Search public web/news sources for current information. Use this before web_extract when the user asks for latest, fresh, current, or news items and does not provide specific URLs.
    risk: read
    input:
      query:
        type: string
        min: 1
        max: 300
        description: Public web/news search query.
      limit:
        type: number
        int: true
        min: 1
        max: 10
        optional: true
        description: Maximum number of search results. Defaults to 5.

