provider: hubspot
source:
  url: https://developers.hubspot.com/docs/apps/developer-platform/build-apps/authentication/scopes
  retrievedAt: "2026-06-03"
filter:
  include:
    - Scope names ending in ".read" from the HubSpot developer-platform scopes reference.
  exclude:
    - Sensitive-data scopes containing ".sensitive." or ".highly_sensitive.".
    - Deprecated scopes listed by HubSpot: accounting, actions, e-commerce, integration-sync, social.
    - Read scopes that HubSpot flags as appearing in app configuration without a corresponding API.
