provider: google
tools:
  - name: google_get_authenticated_user
    alias: google.getAuthenticatedUser
    implementation: getAuthenticatedUser
    title: Google authenticated user
    description: Return the Google identity connected to this Slack user.
    risk: read
    input: {}

  - name: google_search_drive_files
    alias: google.searchDriveFiles
    implementation: searchDriveFiles
    title: Google Drive file search
    description: >
      Search Google Drive files visible to this Slack user's connected Google account.
      This is the single file search/list tool for My Drive-visible files, Shared with me,
      and Shared Drives. Use scope=shared_with_me for Google Drive's Shared with me area;
      use scope=all_shared_drives for files inside all Shared Drives; use scope=shared_drive
      with sharedDriveId or sharedDriveName for one Shared Drive. Shared with me folders
      are not Shared Drives: first find the folder with scope=shared_with_me, then call
      this tool again with parentId to list that folder's contents. Use mimeType
      application/vnd.google-apps.document when the user asks for Google Docs.
    risk: read
    input:
      query:
        type: string
        optional: true
        description: Optional Drive search terms
      scope:
        type: enum
        optional: true
        values:
          - all
          - shared_with_me
          - shared_drive
          - all_shared_drives
        description: Search scope. all is the default broad visible-file search. shared_with_me lists files/folders directly shared with the user. shared_drive searches one Shared Drive by sharedDriveId or sharedDriveName. all_shared_drives searches every visible Shared Drive.
      sharedDriveId:
        type: string
        optional: true
        description: Optional Shared Drive id returned by google.listSharedDrives. When set, search is scoped to that Shared Drive.
      sharedDriveName:
        type: string
        optional: true
        description: Optional Shared Drive name filter for scope=shared_drive or scope=all_shared_drives.
      parentId:
        type: string
        optional: true
        description: Optional folder id. When set, search is scoped to direct children of that folder.
      sharedWithMe:
        type: boolean
        optional: true
        description: Set true to search files and folders in Google Drive's Shared with me area. This is different from Shared Drives.
      mimeType:
        type: string
        optional: true
        description: Optional exact MIME type filter, such as application/vnd.google-apps.document for Google Docs.
      limit:
        type: number
        int: true
        positive: true
        max: 20
        optional: true

  - name: google_list_shared_drives
    alias: google.listSharedDrives
    implementation: listSharedDrives
    title: Google Shared Drives list
    description: List Shared Drives visible to this Slack user's connected Google account. Use this when the user asks for Shared Drives or Team Drives; Google Drive file search only searches files and folders.
    risk: read
    input:
      query:
        type: string
        optional: true
        description: Optional Shared Drive name filter
      limit:
        type: number
        int: true
        positive: true
        max: 20
        optional: true

  - name: google_create_drive_text_file
    alias: google.createDriveTextFile
    implementation: createDriveTextFile
    title: Google Drive create text file
    description: Create a new app-owned plain/text-like file in Google Drive using this Slack user's connected Google account. Do not use this to create Google Docs, Sheets, or Slides; use dedicated tools for those file types.
    risk: low_write
    confirmation: none
    input:
      name:
        type: string
        min: 1
        max: 200
        description: Drive file name
      text:
        type: string
        max: 200000
        optional: true
        description: Text body to write into the file. Defaults to an empty text file.
      mimeType:
        type: string
        optional: true
        description: Optional non-Google-Workspace MIME type. Defaults to text/plain.

  - name: google_docs_create_document
    alias: google.docsCreateDocument
    aliases:
      - google.createGoogleDoc
      - google.createDocsDocument
    implementation: createDocsDocument
    title: Google Docs create document
    description: Create a Google Docs document from plain text or Markdown content by importing it into Google Drive as a Google Workspace document. Use this for explicit requests to convert text or Markdown into a Google Doc.
    risk: low_write
    confirmation: none
    input:
      name:
        type: string
        min: 1
        max: 200
        description: Google Docs document title
      text:
        type: string
        max: 200000
        optional: true
        description: Text or Markdown body to import. Defaults to an empty document.
      sourceMimeType:
        type: string
        aliases: [mimeType, source_mime_type]
        optional: true
        description: Source content MIME type. Defaults to text/markdown; use text/plain for plain text.
      parentId:
        type: string
        min: 1
        optional: true
        description: Optional destination Drive folder ID.

  - name: google_get_drive_file
    alias: google.getDriveFile
    implementation: getDriveFile
    stateRefInputs: [fileId]
    title: Google Drive get file
    description: Read Google Drive file metadata and, by default, text content for files accessible to the connected Google account and granted Drive scopes. Drive metadata search may find files whose content cannot be read or edited if the stored Google connection lacks the required Drive scope or the file is not shared with the connected account.
    risk: read
    input:
      fileId:
        type: string
        min: 1
        description: Google Drive file ID
      includeContent:
        type: boolean
        optional: true
        description: Whether to include exported/downloaded text content. Defaults to true.
      mimeType:
        type: string
        min: 1
        optional: true
        description: Optional Drive MIME type hint from search results. Used to choose the safest MCP-GW export format.
      exportMimeType:
        type: string
        min: 1
        optional: true
        description: Optional explicit export MIME type override for Google Workspace files.

  - name: google_update_drive_text_file
    alias: google.updateDriveTextFile
    implementation: updateDriveTextFile
    stateRefInputs: [fileId]
    stateRefRequired: true
    title: Google Drive update text file
    description: Replace the content of a Google Drive text file accessible to the connected Google account and granted Drive scopes. Use google_get_drive_file first when preserving existing content matters.
    risk: moderate_write
    confirmation: none
    input:
      fileId:
        type: string
        min: 1
        description: Google Drive file ID
      text:
        type: string
        max: 1000000
        description: New full file text
      mimeType:
        type: string
        optional: true
        description: Optional MIME type. Defaults to text/plain.

  - name: google_append_to_drive_text_file
    alias: google.appendDriveTextFile
    aliases:
      - google.appendToDriveTextFile
    implementation: appendDriveTextFile
    stateRefInputs: [fileId]
    stateRefRequired: true
    title: Google Drive append text file
    description: Append text to a Google Drive text file accessible to the connected Google account and granted Drive scopes by reading existing content then replacing it.
    risk: moderate_write
    confirmation: none
    input:
      fileId:
        type: string
        min: 1
        description: Google Drive file ID
      text:
        type: string
        max: 200000
        description: Text to append
      separator:
        type: string
        max: 20
        optional: true
        description: Separator before appended text
      mimeType:
        type: string
        optional: true
        description: Optional MIME type. Defaults to text/plain.

  - name: google_create_drive_folder
    alias: google.createDriveFolder
    implementation: createDriveFolder
    title: Google Drive create folder
    description: Create a Google Drive folder using this Slack user's Google account.
    risk: low_write
    confirmation: none
    input:
      name:
        type: string
        min: 1
        max: 200
        description: Folder name
      parentId:
        type: string
        min: 1
        optional: true
        description: Optional parent folder ID

  - name: google_move_drive_file
    alias: google.moveDriveFile
    implementation: moveDriveFile
    title: Google Drive move file
    description: Move a Google Drive file accessible to the connected Google account and granted Drive scopes into a folder. Does not delete the file.
    risk: moderate_write
    confirmation: none
    input:
      fileId:
        type: string
        min: 1
        description: Google Drive file ID
      parentId:
        type: string
        min: 1
        description: Destination folder ID
      removeParentIds:
        type: array
        items: string
        itemMin: 1
        max: 20
        optional: true
        description: Optional parent IDs to remove. Defaults to current parents.

  - name: google_search_calendar_events
    alias: google.searchCalendarEvents
    implementation: searchCalendarEvents
    title: Google Calendar event search
    description: Search upcoming Google Calendar events visible to this Slack user's connected Google account.
    risk: read
    input:
      query:
        type: string
        optional: true
        description: Optional calendar search terms
      timeMin:
        type: string
        optional: true
        description: Optional RFC3339 lower bound; defaults to now
      timeMax:
        type: string
        optional: true
        description: Optional RFC3339 upper bound
      limit:
        type: number
        int: true
        positive: true
        max: 20
        optional: true

  - name: google_create_calendar_event
    alias: google.createCalendarEvent
    implementation: createCalendarEvent
    title: Google Calendar create event
    description: Create a Google Calendar event. Use only when clearly requested.
    risk: moderate_write
    confirmation: none
    input:
      calendarId:
        type: string
        optional: true
        description: Calendar ID. Defaults to primary.
      summary:
        type: string
        min: 1
        max: 512
        description: Event title
      start:
        type: string
        min: 1
        description: RFC3339 start date-time
      end:
        type: string
        min: 1
        description: RFC3339 end date-time
      description:
        type: string
        max: 65536
        optional: true
      location:
        type: string
        max: 512
        optional: true
      timeZone:
        type: string
        optional: true
        description: Optional IANA time zone

  - name: google_update_calendar_event
    alias: google.updateCalendarEvent
    implementation: updateCalendarEvent
    title: Google Calendar update event
    description: Update Google Calendar event metadata or start/end time. Does not delete events.
    risk: moderate_write
    confirmation: none
    input:
      calendarId:
        type: string
        optional: true
        description: Calendar ID. Defaults to primary.
      eventId:
        type: string
        min: 1
        description: Calendar event ID
      summary:
        type: string
        min: 1
        max: 512
        optional: true
      start:
        type: string
        min: 1
        optional: true
        description: RFC3339 start date-time
      end:
        type: string
        min: 1
        optional: true
        description: RFC3339 end date-time
      description:
        type: string
        max: 65536
        optional: true
      location:
        type: string
        max: 512
        optional: true
      timeZone:
        type: string
        optional: true
        description: Optional IANA time zone

  - name: google_search_mail_messages
    alias: google.searchMailMessages
    implementation: searchMailMessages
    title: Google Mail message search
    description: Search Gmail messages visible to this Slack user's connected Google account.
    risk: read
    input:
      query:
        type: string
        min: 1
        description: Gmail search query
      limit:
        type: number
        int: true
        positive: true
        max: 10
        optional: true

  - name: google_slides_search_presentations
    alias: google.slidesSearchPresentations
    implementation: searchSlidesPresentations
    title: Google Slides presentation search
    description: Search Google Slides presentations visible to this Slack user's connected Google account.
    risk: read
    input:
      query:
        type: string
        optional: true
        description: Optional presentation name search query.
      limit:
        type: number
        int: true
        positive: true
        max: 20
        optional: true

  - name: google_slides_get_presentation
    alias: google.slidesGetPresentation
    implementation: getSlidesPresentation
    title: Google Slides presentation read
    description: Read sanitized structure, slide text, layout IDs, and placeholder metadata from a Google Slides presentation.
    risk: read
    input:
      presentationId:
        type: string
        min: 1
        description: Google Slides presentation ID.
      includeSlides:
        type: boolean
        optional: true
        description: Whether to include slide content. Defaults to true.

  - name: google_slides_probe_template
    alias: google.slidesProbeTemplate
    implementation: probeSlidesTemplate
    title: Google Slides template probe
    description: Probe a Google Slides presentation's layouts and placeholders into a manifest for future deterministic slide rendering.
    risk: read
    input:
      presentationId:
        type: string
        min: 1
        description: Google Slides presentation ID to inspect as a template.

  - name: google_slides_copy_presentation
    alias: google.slidesCopyPresentation
    implementation: copySlidesPresentation
    title: Google Slides copy presentation
    description: Copy an existing Google Slides presentation into a new presentation using the connected Google account. Use this for explicit user requests to create a new deck from a template; it does not edit slide contents.
    risk: low_write
    confirmation: none
    input:
      presentationId:
        type: string
        min: 1
        description: Source Google Slides presentation ID.
      name:
        type: string
        min: 1
        max: 200
        description: Name for the copied presentation.

  - name: google_slides_create_slide
    alias: google.slidesCreateSlide
    implementation: createSlidesSlide
    title: Google Slides create slide
    description: Create a new slide in an existing Google Slides presentation, optionally from a layout or predefined layout, and optionally fill placeholders on the created slide. Use this for explicit user requests to add a slide to a deck.
    risk: low_write
    confirmation: none
    input:
      presentationId:
        type: string
        min: 1
        aliases: [presentation_id, deckId, deck_id]
        description: Google Slides presentation ID to edit.
      objectId:
        type: string
        min: 1
        aliases:
          - object_id
          - slideObjectId
          - slide_object_id
          - slideId
          - slide_id
        optional: true
        description: Optional caller-supplied object ID for the new slide.
      insertionIndex:
        type: number
        int: true
        min: 0
        aliases: [insertion_index, index, slideIndex, slide_index]
        optional: true
        description: Optional zero-based insertion index. Use 2 to create slide 3.
      layoutObjectId:
        type: string
        min: 1
        aliases: [layout_object_id, layoutId, layout_id]
        optional: true
        description: Optional layout object ID from google_slides_get_presentation or google_slides_probe_template.
      predefinedLayout:
        type: string
        min: 1
        aliases: [predefined_layout, layout, layoutType, layout_type]
        optional: true
        description: Optional Google predefined layout such as TITLE_AND_BODY or TITLE_AND_TWO_COLUMNS.
      replacements:
        type: array
        min: 1
        max: 10
        optional: true
        aliases: [replacement, updates, update, placeholders, placeholder, fills, fill]
        description: Optional placeholder text replacements to apply to the created slide.
        items:
          type: object
          properties:
            placeholderType:
              type: string
              min: 1
              aliases: [placeholder_type, type, role, placeholder]
              description: Google Slides placeholder type such as TITLE, SUBTITLE, BODY, CENTERED_TITLE, or SLIDE_NUMBER.
            text:
              type: string
              max: 5000
              aliases: [value, content, replacementText, replacement_text]
              description: Text to place into the placeholder.
            index:
              type: number
              int: true
              min: 0
              aliases: [placeholderIndex, placeholder_index]
              optional: true
              description: Optional placeholder index when a slide has multiple placeholders of the same type.
      placeholderType:
        type: string
        min: 1
        aliases: [placeholder_type, type, role]
        optional: true
        description: Compatibility top-level placeholder type alias normalized by the Google Slides provider.
      text:
        type: string
        max: 5000
        aliases: [value, content, replacementText, replacement_text]
        optional: true
        description: Compatibility top-level placeholder text alias normalized by the Google Slides provider.
      title:
        type: string
        max: 5000
        optional: true
        description: Compatibility title text alias normalized by the Google Slides provider.
      subtitle:
        type: string
        max: 5000
        optional: true
        description: Compatibility subtitle text alias normalized by the Google Slides provider.
      body:
        type: string
        max: 5000
        optional: true
        description: Compatibility body text alias normalized by the Google Slides provider.

  - name: google_slides_fill_placeholders
    alias: google.slidesFillPlaceholders
    implementation: fillSlidesPlaceholders
    title: Google Slides fill placeholders
    description: Fill text placeholders on an existing Google Slides presentation slide. When slideObjectId is omitted, Burble chooses the slide that best matches the requested placeholders. Use for explicit user requests to set title, subtitle, body, or similar placeholder text in a deck.
    risk: low_write
    confirmation: none
    retrySafe: false
    input:
      presentationId:
        type: string
        min: 1
        aliases: [presentation_id, deckId, deck_id]
        description: Google Slides presentation ID to edit.
      slideObjectId:
        type: string
        aliases: [slide_object_id, slideId, slide_id, pageObjectId, page_object_id]
        optional: true
        description: Optional slide object ID. If omitted, Burble chooses the slide that best matches the requested placeholders.
      replacements:
        type: array
        min: 1
        max: 10
        optional: true
        aliases: [replacement, updates, update, placeholders, placeholder, fills, fill]
        description: Placeholder text replacements to apply.
        items:
          type: object
          properties:
            placeholderType:
              type: string
              min: 1
              aliases: [placeholder_type, type, role, placeholder]
              description: Google Slides placeholder type such as TITLE, SUBTITLE, BODY, CENTERED_TITLE, or SLIDE_NUMBER.
            text:
              type: string
              max: 5000
              aliases: [value, content, replacementText, replacement_text]
              description: Text to place into the placeholder.
            index:
              type: number
              int: true
              min: 0
              aliases: [placeholderIndex, placeholder_index]
              optional: true
              description: Optional placeholder index when a slide has multiple placeholders of the same type.
      placeholderType:
        type: string
        min: 1
        aliases: [placeholder_type, type, role]
        optional: true
        description: Compatibility top-level placeholder type alias normalized by the Google Slides provider.
      text:
        type: string
        max: 5000
        aliases: [value, content, replacementText, replacement_text]
        optional: true
        description: Compatibility top-level placeholder text alias normalized by the Google Slides provider.
      index:
        type: number
        int: true
        min: 0
        aliases: [placeholderIndex, placeholder_index]
        optional: true
        description: Compatibility top-level placeholder index alias normalized by the Google Slides provider.
      title:
        type: string
        max: 5000
        optional: true
        description: Compatibility title text alias normalized by the Google Slides provider.
      subtitle:
        type: string
        max: 5000
        optional: true
        description: Compatibility subtitle text alias normalized by the Google Slides provider.
      body:
        type: string
        max: 5000
        optional: true
        description: Compatibility body text alias normalized by the Google Slides provider.

  - name: google_analytics_list_properties
    alias: google.analyticsListProperties
    implementation: listAnalyticsProperties
    title: Google Analytics property list
    description: List Google Analytics accounts and GA4 properties visible to this Slack user's connected Google account.
    risk: read
    input:
      limit:
        type: number
        int: true
        positive: true
        max: 50
        optional: true

  - name: google_analytics_get_metadata
    alias: google.analyticsGetMetadata
    implementation: getAnalyticsMetadata
    title: Google Analytics metadata
    description: List available Google Analytics dimensions and metrics for a GA4 property, optionally filtered by search terms.
    risk: read
    input:
      propertyId:
        type: string
        min: 1
        description: GA4 property ID, either numeric or properties/{id}.
      dimensionQuery:
        type: string
        optional: true
        description: Optional case-insensitive filter for dimensions.
      metricQuery:
        type: string
        optional: true
        description: Optional case-insensitive filter for metrics.
      limit:
        type: number
        int: true
        positive: true
        max: 100
        optional: true

  - name: google_analytics_run_report
    alias: google.analyticsRunReport
    implementation: runAnalyticsReport
    title: Google Analytics run report
    description: Run a read-only GA4 report for a Google Analytics property using selected dimensions, metrics, and a date range of at most 366 days.
    risk: read
    input:
      propertyId:
        type: string
        min: 1
        aliases: [property_id, property]
        description: GA4 property ID, either numeric or properties/{id}.
      startDate:
        type: string
        min: 1
        aliases: [start_date]
        description: Report start date, e.g. 2026-06-01 or 30daysAgo.
      endDate:
        type: string
        min: 1
        aliases: [end_date]
        description: Report end date, e.g. today.
      metrics:
        type: array
        items: string
        itemMin: 1
        min: 1
        max: 10
        description: GA4 metric API names, such as activeUsers or sessions.
      dimensions:
        type: array
        items: string
        itemMin: 1
        max: 10
        optional: true
        description: Optional GA4 dimension API names, such as country or date.
      limit:
        type: number
        int: true
        positive: true
        max: 100
        optional: true

  - name: gmail_create_draft
    alias: gmail.createDraft
    implementation: createMailDraft
    title: Gmail create draft
    description: Create a Gmail draft only. This does not send email and should be used before any user-reviewed send workflow.
    risk: low_write
    confirmation: none
    input:
      to:
        type: array
        items: string
        itemFormat: email
        min: 1
        max: 20
        description: Recipient emails
      subject:
        type: string
        min: 1
        max: 512
        description: Draft subject
      body:
        type: string
        max: 200000
        description: Plain text draft body
      cc:
        type: array
        items: string
        itemFormat: email
        max: 20
        optional: true
      bcc:
        type: array
        items: string
        itemFormat: email
        max: 20
        optional: true
