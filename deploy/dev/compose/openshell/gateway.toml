# NVIDIA OpenShell gateway configuration for the Burble dev compose stack.
# This uses OpenShell's Docker compute driver so it can run on the same AWS
# Docker host as the rest of the dev stack.

[openshell]
version = 1

[openshell.gateway]
bind_address        = "0.0.0.0:8080"
health_bind_address = "0.0.0.0:8081"
log_level           = "info"
compute_drivers     = ["docker"]
disable_tls         = true

[openshell.gateway.auth]
allow_unauthenticated_users = true

[openshell.gateway.gateway_jwt]
signing_key_path = "/var/lib/openshell/jwt/signing.pem"
public_key_path  = "/var/lib/openshell/jwt/public.pem"
kid_path         = "/var/lib/openshell/jwt/kid"
gateway_id       = "burble-dev-openshell"
ttl_secs         = 0

[openshell.drivers.docker]
default_image     = "ghcr.io/nvidia/openshell-community/sandboxes/base:latest"
supervisor_image  = "ghcr.io/nvidia/openshell/supervisor:latest"
image_pull_policy = "IfNotPresent"
sandbox_namespace = "openshell"
# This URL is consumed from sandbox containers created by the Docker driver,
# not from the compose-managed gateway container. Those containers do not
# inherit compose extra_hosts entries, so use the Docker host bridge address.
grpc_endpoint     = "http://172.17.0.1:8080"
