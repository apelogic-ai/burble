# Optional PoC3 override for one OpenClaw/NemoClaw runtime container per user.
#
# First build the runtime image:
#   docker compose \
#     -f docker-compose.yml \
#     -f docker-compose.personal-runtimes.yml \
#     --profile runtime-image \
#     build openclaw-nemoclaw-image
#
# Then start Burble with Docker-backed personal runtimes:
#   docker compose \
#     -f docker-compose.yml \
#     -f docker-compose.personal-runtimes.yml \
#     up -d --build

services:
  burble-app:
    environment:
      - AGENT_MODE=llm
      - AGENT_RUNTIME=openclaw-nemoclaw
      - AGENT_RUNTIME_FACTORY=docker
      - AGENT_RUNTIME_IMAGE=${AGENT_RUNTIME_IMAGE:-burble-openclaw-nemoclaw-openclaw-cli:dev}
      - AGENT_RUNTIME_ENGINE=${AGENT_RUNTIME_ENGINE:-}
      - AGENT_RUNTIME_DOCKER_NETWORK=${AGENT_RUNTIME_DOCKER_NETWORK:-compose_default}
      - AGENT_RUNTIME_DATA_ROOT=${AGENT_RUNTIME_DATA_ROOT:-/opt/burble/runtimes}
      - AGENT_RUNTIME_IDLE_TTL_MS=${AGENT_RUNTIME_IDLE_TTL_MS:-86400000}
      - AGENT_RUNTIME_REAPER_ENABLED=${AGENT_RUNTIME_REAPER_ENABLED:-true}
      - AGENT_RUNTIME_REAPER_INTERVAL_MS=${AGENT_RUNTIME_REAPER_INTERVAL_MS:-60000}
      - AGENT_RUNTIME_JWT_TTL_SECONDS=${AGENT_RUNTIME_JWT_TTL_SECONDS:-604800}
      - AGENT_RUNTIME_TOKEN_SECRET=${AGENT_RUNTIME_TOKEN_SECRET:?AGENT_RUNTIME_TOKEN_SECRET is required}
      - AGENT_RUNTIME_TOOL_GATEWAY_URL=http://burble-app:3000/internal/tools
      - AGENT_RUNTIME_MCP_GATEWAY_URL=${AGENT_RUNTIME_MCP_GATEWAY_URL:-http://burble-app:3000/mcp}
      - AGENT_RUNTIME_MCP_AUDIENCE=${AGENT_RUNTIME_MCP_AUDIENCE:-}
      - RUNTIME_JWT_ISSUER=${RUNTIME_JWT_ISSUER:-http://burble-app:3000}
      - RUNTIME_JWT_PRIVATE_KEY_PATH=${RUNTIME_JWT_PRIVATE_KEY_PATH:-/data/runtime-jwt-private.pem}
      - OPENCLAW_CONFIG_PATCH_HOST_PATH=${OPENCLAW_CONFIG_PATCH_HOST_PATH:-}
      - OPENCLAW_NEMOCLAW_ENGINE=${OPENCLAW_NEMOCLAW_ENGINE:-openclaw}
      - OPENCLAW_TIMEOUT_MS=${OPENCLAW_TIMEOUT_MS:-180000}
      - OPENCLAW_STREAM_DEBUG=${OPENCLAW_STREAM_DEBUG:-false}
      - OPENCLAW_LOG_LEVEL=${OPENCLAW_LOG_LEVEL:-}
      - OPENCLAW_DIAGNOSTICS=${OPENCLAW_DIAGNOSTICS:-}
      - OPENCLAW_DEBUG_MODEL_TRANSPORT=${OPENCLAW_DEBUG_MODEL_TRANSPORT:-}
      - OPENCLAW_DEBUG_MODEL_PAYLOAD=${OPENCLAW_DEBUG_MODEL_PAYLOAD:-}
      - OPENCLAW_DEBUG_SSE=${OPENCLAW_DEBUG_SSE:-}
      - OPENCLAW_DEBUG_CODE_MODE=${OPENCLAW_DEBUG_CODE_MODE:-}
      - OPENCLAW_CODE_MODE=${OPENCLAW_CODE_MODE:-false}
      - OPENCLAW_RAW_STREAM_DEBUG=${OPENCLAW_RAW_STREAM_DEBUG:-false}
      - OPENCLAW_GATEWAY_PORT=${OPENCLAW_GATEWAY_PORT:-18789}
      - OPENCLAW_GATEWAY_BIND=${OPENCLAW_GATEWAY_BIND:-loopback}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
      - INTERNAL_API_TOKEN=${INTERNAL_API_TOKEN:?INTERNAL_API_TOKEN is required}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${AGENT_RUNTIME_DATA_ROOT:-/opt/burble/runtimes}:${AGENT_RUNTIME_DATA_ROOT:-/opt/burble/runtimes}

  openclaw-nemoclaw-image:
    profiles:
      - runtime-image
    image: ${AGENT_RUNTIME_IMAGE:-burble-openclaw-nemoclaw-openclaw-cli:dev}
    build:
      context: ../../../runtimes/openclaw-nemoclaw
      dockerfile: Dockerfile.openclaw-cli
      args:
        OPENCLAW_VERSION: ${OPENCLAW_VERSION:-2026.5.19}
    command: ["bun", "--version"]
