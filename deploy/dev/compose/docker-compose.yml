# Burble dev stack.
#
# Caddy terminates HTTPS for ${DOMAIN} and proxies to the Bun Slack app.
# The app serves GitHub OAuth callbacks on port 3000 while Slack events arrive
# through Socket Mode.

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN:?DOMAIN is required}
    depends_on:
      - burble-app

  burble-app:
    build:
      context: ../../..
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - BASE_URL=https://${DOMAIN:?DOMAIN is required}
      - DATABASE_PATH=/data/burble.db
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:?SLACK_BOT_TOKEN is required}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN:?SLACK_APP_TOKEN is required}
      - SLACK_LOG_LEVEL=${SLACK_LOG_LEVEL:-info}
      - AGENT_MODE=${AGENT_MODE:-deterministic}
      - AI_MODEL=${AI_MODEL:-openai/gpt-5.4}
      - AI_GATEWAY_API_KEY=${AI_GATEWAY_API_KEY:-}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:?GITHUB_CLIENT_ID is required}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:?GITHUB_CLIENT_SECRET is required}
    volumes:
      - burble_data:/data
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://localhost:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  caddy_data:
  caddy_config:
  burble_data:
