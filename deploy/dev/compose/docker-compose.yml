# Burble dev stack.
#
# Caddy terminates HTTPS for ${DOMAIN} and proxies to the Bun Slack app.
# The app serves GitHub OAuth callbacks on port 3000 while Slack events arrive
# through Socket Mode.

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN:?DOMAIN is required}
    depends_on:
      - burble-app

  burble-app:
    build:
      context: ../../..
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3000"
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - BASE_URL=https://${DOMAIN:?DOMAIN is required}
      - DATABASE_PATH=/data/burble.db
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:?SLACK_BOT_TOKEN is required}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN:?SLACK_APP_TOKEN is required}
      - SLACK_LOG_LEVEL=${SLACK_LOG_LEVEL:-info}
      - SLACK_CLIENT_ID=${SLACK_CLIENT_ID:-}
      - SLACK_CLIENT_SECRET=${SLACK_CLIENT_SECRET:-}
      - SLACK_REDIRECT_URI=${SLACK_REDIRECT_URI:-}
      - AGENT_MODE=${AGENT_MODE:-deterministic}
      - AGENT_FAST_TRACK=${AGENT_FAST_TRACK:-false}
      - AGENT_RUNTIME=${AGENT_RUNTIME:-ai-sdk}
      - AGENT_RUNTIME_FACTORY=${AGENT_RUNTIME_FACTORY:-static}
      - AGENT_RUNTIME_DATA_ROOT=${AGENT_RUNTIME_DATA_ROOT:-/data/runtimes}
      - AGENT_RUNTIME_IMAGE=${AGENT_RUNTIME_IMAGE:-burble-openclaw-nemoclaw:dev}
      - AGENT_RUNTIME_ENGINE=${AGENT_RUNTIME_ENGINE:-}
      - AGENT_RUNTIME_ALLOWED_ENGINES=${AGENT_RUNTIME_ALLOWED_ENGINES:-}
      - AGENT_RUNTIME_DOCKER_NETWORK=${AGENT_RUNTIME_DOCKER_NETWORK:-compose_default}
      - AGENT_RUNTIME_IDLE_TTL_MS=${AGENT_RUNTIME_IDLE_TTL_MS:-86400000}
      - AGENT_RUNTIME_REAPER_ENABLED=${AGENT_RUNTIME_REAPER_ENABLED:-true}
      - AGENT_RUNTIME_REAPER_INTERVAL_MS=${AGENT_RUNTIME_REAPER_INTERVAL_MS:-60000}
      - AGENT_RUNTIME_JWT_TTL_SECONDS=${AGENT_RUNTIME_JWT_TTL_SECONDS:-604800}
      - AGENT_RUNTIME_TOKEN_SECRET=${AGENT_RUNTIME_TOKEN_SECRET:-}
      - AGENT_RUNTIME_TOOL_GATEWAY_URL=${AGENT_RUNTIME_TOOL_GATEWAY_URL:-http://host.openshell.internal:3000/internal/tools}
      - AGENT_RUNTIME_MCP_GATEWAY_URL=${AGENT_RUNTIME_MCP_GATEWAY_URL:-}
      - AGENT_RUNTIME_MCP_AUDIENCE=${AGENT_RUNTIME_MCP_AUDIENCE:-}
      - AGENT_RUNTIME_STREAMING=${AGENT_RUNTIME_STREAMING:-native}
      - LLM_GW_BASE_URL=${LLM_GW_BASE_URL:-http://host.openshell.internal:4000/v1}
      - BURBLE_INFERENCE_BASE_URL=${BURBLE_INFERENCE_BASE_URL:-http://llm-gw:4000/v1}
      - AGENT_RUNTIME_SANDBOX_URL=${AGENT_RUNTIME_SANDBOX_URL:-}
      - AGENT_RUNTIME_SANDBOX_TOKEN=${AGENT_RUNTIME_SANDBOX_TOKEN:-}
      - AGENT_RUNTIME_SANDBOX_TRANSPORT=${AGENT_RUNTIME_SANDBOX_TRANSPORT:-cli}
      - AGENT_RUNTIME_SANDBOX_START_COMMAND=${AGENT_RUNTIME_SANDBOX_START_COMMAND:-}
      - AGENT_RUNTIME_SANDBOX_PRESERVE_FAILED=${AGENT_RUNTIME_SANDBOX_PRESERVE_FAILED:-false}
      - AGENT_RUNTIME_OPENSHELL_CLI_BIN=${AGENT_RUNTIME_OPENSHELL_CLI_BIN:-}
      - AGENT_RUNTIME_OPENSHELL_DIAL_HOST=${AGENT_RUNTIME_OPENSHELL_DIAL_HOST:-}
      - AGENT_RUNTIME_CONFIG_PATCH_HOST_PATH=${AGENT_RUNTIME_CONFIG_PATCH_HOST_PATH:-${OPENCLAW_CONFIG_PATCH_HOST_PATH:-}}
      - ATLASSIAN_MCP_URL=${ATLASSIAN_MCP_URL:-https://mcp.atlassian.com/v1/mcp}
      - RUNTIME_JWT_ISSUER=${RUNTIME_JWT_ISSUER:-https://${DOMAIN:?DOMAIN is required}}
      - RUNTIME_JWT_PRIVATE_KEY_PATH=${RUNTIME_JWT_PRIVATE_KEY_PATH:-/data/runtime-jwt-private.pem}
      - MCP_IDENTITY_ISSUER=${MCP_IDENTITY_ISSUER:-https://${DOMAIN:?DOMAIN is required}/mcp-identity}
      - MCP_IDENTITY_PRIVATE_KEY_PATH=${MCP_IDENTITY_PRIVATE_KEY_PATH:-/data/mcp-identity-private.pem}
      - MCP_GW_AUDIENCE=${MCP_GW_AUDIENCE:-}
      - MCP_GW_MCP_URL=${MCP_GW_MCP_URL:-}
      - GOOGLE_VIA_MCP_GW=${GOOGLE_VIA_MCP_GW:-false}
      - OBSERVABILITY_JSONL_PATH=${OBSERVABILITY_JSONL_PATH:-}
      - OBSERVABILITY_JSONL_DIR=${OBSERVABILITY_JSONL_DIR:-/data/observability/events}
      - OBSERVABILITY_INCLUDE_CONTENT=${OBSERVABILITY_INCLUDE_CONTENT:-false}
      - TASK_WORKFLOW_SHADOW_ENABLED=${TASK_WORKFLOW_SHADOW_ENABLED:-false}
      - TASK_WORKFLOW_SHADOW_DATABASE_PATH=${TASK_WORKFLOW_SHADOW_DATABASE_PATH:-}
      - TASK_WORKFLOW_AUTHORITY=${TASK_WORKFLOW_AUTHORITY:-off}
      - TASK_WORKFLOW_MAX_ATTEMPTS=${TASK_WORKFLOW_MAX_ATTEMPTS:-2}
      - SCHEDULED_RUN_AUDIT_RETENTION_DAYS=${SCHEDULED_RUN_AUDIT_RETENTION_DAYS:-90}
      - SCHEDULED_RUN_AUDIT_PRUNE_INTERVAL_MS=${SCHEDULED_RUN_AUDIT_PRUNE_INTERVAL_MS:-86400000}
      - AI_MODEL=${AI_MODEL:-openai:gpt-5.4}
      - OPENCLAW_MODEL_API=${OPENCLAW_MODEL_API:-openai-responses}
      - OPENCLAW_FAST_MODE=${OPENCLAW_FAST_MODE:-false}
      - OPENCLAW_NEMOCLAW_URL=${OPENCLAW_NEMOCLAW_URL:-}
      - OPENCLAW_CONFIG_PATCH_HOST_PATH=${OPENCLAW_CONFIG_PATCH_HOST_PATH:-}
      - INTERNAL_API_TOKEN=${INTERNAL_API_TOKEN:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-https://ollama.com}
      - OLLAMA_OPENAI_BASE_URL=${OLLAMA_OPENAI_BASE_URL:-}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:?GITHUB_CLIENT_ID is required}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:?GITHUB_CLIENT_SECRET is required}
      - JIRA_CLIENT_ID=${JIRA_CLIENT_ID:-}
      - JIRA_CLIENT_SECRET=${JIRA_CLIENT_SECRET:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - HUBSPOT_CLIENT_ID=${HUBSPOT_CLIENT_ID:-}
      - HUBSPOT_CLIENT_SECRET=${HUBSPOT_CLIENT_SECRET:-}
    volumes:
      - burble_data:/data
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://localhost:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  llm-gw:
    image: ghcr.io/berriai/litellm:v1.92.0
    restart: unless-stopped
    expose:
      - "4000"
    ports:
      - "4000:4000"
    command:
      - --config
      - /app/config.yaml
      - --host
      - 0.0.0.0
      - --port
      - "4000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-https://ollama.com}
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
      - ./litellm/burble_observability.py:/app/burble_observability.py:ro

volumes:
  caddy_data:
  caddy_config:
  burble_data:
