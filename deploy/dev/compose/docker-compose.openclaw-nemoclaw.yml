# Optional OpenClaw/NemoClaw runner override.
#
# Usage:
#   docker compose \
#     -f docker-compose.yml \
#     -f docker-compose.openclaw-nemoclaw.yml \
#     up -d --build

services:
  burble-app:
    environment:
      - AGENT_MODE=llm
      - AGENT_FAST_TRACK=${AGENT_FAST_TRACK:-false}
      - AGENT_RUNTIME=burble-runtime
      - AGENT_RUNTIME_FACTORY=static
      - OPENCLAW_NEMOCLAW_URL=http://openclaw-nemoclaw:8080
      - AGENT_RUNTIME_ENGINE=${AGENT_RUNTIME_ENGINE:-}
      - OPENCLAW_NEMOCLAW_ENGINE=${OPENCLAW_NEMOCLAW_ENGINE:-deterministic}
      - INTERNAL_API_TOKEN=${INTERNAL_API_TOKEN:?INTERNAL_API_TOKEN is required}
    depends_on:
      - openclaw-nemoclaw

  openclaw-nemoclaw:
    image: ${OPENCLAW_NEMOCLAW_IMAGE:-burble-openclaw-nemoclaw:dev}
    build:
      context: ../../..
      dockerfile: runtimes/openclaw-nemoclaw/Dockerfile
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      - BURBLE_TOOL_GATEWAY_URL=http://burble-app:3000/internal/tools
      - BURBLE_AGENT_RUN_EVENTS_URL=http://burble-app:3000/internal/agent-runs
      - BURBLE_INTERNAL_TOKEN=${INTERNAL_API_TOKEN:?INTERNAL_API_TOKEN is required}
      - OPENCLAW_NEMOCLAW_ENGINE=${OPENCLAW_NEMOCLAW_ENGINE:-deterministic}
      - OPENCLAW_COMMAND=${OPENCLAW_COMMAND:-openclaw}
      - OPENCLAW_AGENT=${OPENCLAW_AGENT:-main}
      - OPENCLAW_TIMEOUT_MS=${OPENCLAW_TIMEOUT_MS:-60000}
      - OPENCLAW_STATE_DIR=${OPENCLAW_STATE_DIR:-/data/openclaw/state}
      - OPENCLAW_CONFIG_PATH=${OPENCLAW_CONFIG_PATH:-/data/openclaw/config/openclaw.json}
      - OPENCLAW_WORKSPACE_DIR=${OPENCLAW_WORKSPACE_DIR:-/data/openclaw/workspace}
      - OPENCLAW_SETUP_ON_START=${OPENCLAW_SETUP_ON_START:-true}
      - OPENCLAW_CONFIG_PATCH_PATH=${OPENCLAW_CONFIG_PATCH_PATH:-}
      - OPENCLAW_VALIDATE_ON_START=${OPENCLAW_VALIDATE_ON_START:-true}
      - OPENCLAW_STREAM_DEBUG=${OPENCLAW_STREAM_DEBUG:-false}
      - OPENCLAW_LOG_LEVEL=${OPENCLAW_LOG_LEVEL:-}
      - OPENCLAW_DIAGNOSTICS=${OPENCLAW_DIAGNOSTICS:-}
      - OPENCLAW_DEBUG_MODEL_TRANSPORT=${OPENCLAW_DEBUG_MODEL_TRANSPORT:-}
      - OPENCLAW_DEBUG_MODEL_PAYLOAD=${OPENCLAW_DEBUG_MODEL_PAYLOAD:-}
      - OPENCLAW_DEBUG_SSE=${OPENCLAW_DEBUG_SSE:-}
      - OPENCLAW_DEBUG_CODE_MODE=${OPENCLAW_DEBUG_CODE_MODE:-}
      - OPENCLAW_CODE_MODE=${OPENCLAW_CODE_MODE:-false}
      - OPENCLAW_FAST_MODE=${OPENCLAW_FAST_MODE:-false}
      - OPENCLAW_RAW_STREAM_DEBUG=${OPENCLAW_RAW_STREAM_DEBUG:-false}
      - OPENCLAW_GATEWAY_PORT=${OPENCLAW_GATEWAY_PORT:-18789}
      - OPENCLAW_GATEWAY_BIND=${OPENCLAW_GATEWAY_BIND:-loopback}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
      - AI_MODEL=${AI_MODEL:-openai:gpt-5.4}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-https://ollama.com}
    volumes:
      - openclaw_nemoclaw_data:/data
      - ./openclaw-patches:/etc/openclaw/patches:ro

volumes:
  openclaw_nemoclaw_data:
