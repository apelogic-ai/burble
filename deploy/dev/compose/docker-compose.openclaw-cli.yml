# Optional override for the runtime image that installs the OpenClaw CLI.
#
# Usage:
#   docker compose \
#     -f docker-compose.yml \
#     -f docker-compose.openclaw-nemoclaw.yml \
#     -f docker-compose.openclaw-cli.yml \
#     up -d --build

services:
  openclaw-nemoclaw:
    image: ${OPENCLAW_NEMOCLAW_IMAGE:-burble-openclaw-nemoclaw-openclaw-cli:dev}
    build:
      context: ../../..
      dockerfile: runtimes/openclaw-nemoclaw/Dockerfile.openclaw-cli
      args:
        OPENCLAW_VERSION: ${OPENCLAW_VERSION:-2026.6.11}
    environment:
      - OPENCLAW_NEMOCLAW_ENGINE=${OPENCLAW_NEMOCLAW_ENGINE:-openclaw}
