display_information:
  name: Burble
features:
  bot_user:
    display_name: Burble
    always_online: true
  slash_commands:
    - command: /auth
      description: Show Burble connection status and auth actions.
      usage_hint: "[github|jira|slack]"
      url: https://example.com/slack/commands
      should_escape: false
    - command: /help
      description: Show Burble commands and examples.
      url: https://example.com/slack/commands
      should_escape: false
    - command: /agent
      description: Show or inspect your Burble agent runtime.
      usage_hint: "[status|config]"
      url: https://example.com/slack/commands
      should_escape: false
    - command: /agent-status
      description: Power up and show your Burble agent runtime status.
      url: https://example.com/slack/commands
      should_escape: false
    - command: /agent-config
      description: Power up and inspect your Burble agent runtime config.
      url: https://example.com/slack/commands
      should_escape: false
oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - channels:history
      - chat:write
      - commands
      - groups:history
      - im:history
      - im:write
      - users:read
      - users:read.email
    user:
      - search:read
      - users:read
settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - message.im
  interactivity:
    is_enabled: true
    request_url: https://example.com/slack/interactivity
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
