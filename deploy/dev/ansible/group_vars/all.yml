# Per-environment, non-secret values. Fill these from `terraform output`.
# Slack and GitHub secrets live in secrets.yml, which is gitignored.

aws_region: us-west-2
instance_id: i-CHANGEME
ssm_transfer_bucket: burble-dev-CHANGEME-ssm-transfer

# Terraform outputs this as `nip_io_domain`, e.g. 203.0.113.10.nip.io.
domain: CHANGEME.nip.io

burble_repo_url: CHANGEME
burble_repo_ref: main
burble_install_path: /home/ubuntu/burble

agent_mode: deterministic
agent_fast_track: false
agent_runtime: ai-sdk
agent_runtime_factory: static
agent_runtime_engine: ""
agent_runtime_image: ""
agent_runtime_data_root: /data/runtimes
agent_runtime_docker_network: compose_default
agent_runtime_idle_ttl_ms: 86400000
agent_runtime_reaper_enabled: true
agent_runtime_reaper_interval_ms: 60000
agent_runtime_jwt_ttl_seconds: 604800
agent_runtime_tool_gateway_url: http://burble-app:3000/internal/tools
agent_runtime_mcp_gateway_url: ""
agent_runtime_mcp_audience: ""
agent_runtime_streaming: native
llm_gw_base_url: http://host.openshell.internal:4000/v1
burble_inference_base_url: http://llm-gw:4000/v1
agent_runtime_sandbox_url: ""
agent_runtime_sandbox_transport: cli
agent_runtime_sandbox_start_command: ""
agent_runtime_openshell_cli_bin: ""
agent_runtime_openshell_dial_host: ""
agent_runtime_config_patch_host_path: ""
ai_model: openai:gpt-5.4
ollama_base_url: https://ollama.com
openclaw_nemoclaw_url: ""
openclaw_nemoclaw_image: ""
openclaw_nemoclaw_engine: deterministic
openclaw_command: openclaw
openclaw_agent: main
openclaw_timeout_ms: 60000
openclaw_state_dir: /data/openclaw/state
openclaw_config_path: /data/openclaw/config/openclaw.json
openclaw_workspace_dir: /data/openclaw/workspace
openclaw_setup_on_start: true
openclaw_config_patch_path: ""
openclaw_validate_on_start: true
openclaw_stream_debug: false
openclaw_log_level: ""
openclaw_diagnostics: ""
openclaw_debug_model_transport: ""
openclaw_debug_model_payload: ""
openclaw_debug_sse: ""
openclaw_debug_code_mode: ""
openclaw_code_mode: false
openclaw_model_api: openai-responses
openclaw_fast_mode: false
openclaw_raw_stream_debug: false
openclaw_gateway_port: 18789
openclaw_gateway_bind: loopback
openclaw_gateway_token: ""
openclaw_version: "2026.6.11"
internal_api_token: ""
atlassian_mcp_url: https://mcp.atlassian.com/v1/mcp
runtime_jwt_issuer: ""
runtime_jwt_private_key_path: /data/runtime-jwt-private.pem
observability_jsonl_path: ""
observability_jsonl_dir: /data/observability/events
observability_include_content: false
task_workflow_shadow_enabled: false
task_workflow_shadow_database_path: ""
task_workflow_authority: off
task_workflow_max_attempts: 2
scheduled_run_audit_retention_days: 90
scheduled_run_audit_prune_interval_ms: 86400000
