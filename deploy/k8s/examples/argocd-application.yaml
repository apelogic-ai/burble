apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: burble
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/<client>/burble.git
    targetRevision: main
    path: deploy/k8s/chart
    helm:
      valueFiles:
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: burble
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
