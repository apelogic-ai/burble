{{- if eq .Values.agentgateway.mode "managed" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "burble.agentgateway.fullname" . }}
  labels:
    {{- include "burble.labels" . | nindent 4 }}
    app.kubernetes.io/component: agentgateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "burble.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: agentgateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "burble.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: agentgateway
    spec:
      containers:
        - name: agentgateway
          image: {{ .Values.agentgateway.image.repository }}{{- if .Values.agentgateway.image.digest }}@{{ .Values.agentgateway.image.digest }}{{- else }}:{{ .Values.agentgateway.image.tag }}{{- end }}
          imagePullPolicy: {{ .Values.agentgateway.image.pullPolicy }}
          args:
            - --file
            - /etc/agentgateway/config.yaml
          ports:
            - name: http
              containerPort: 3000
          resources:
            {{- toYaml .Values.agentgateway.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/agentgateway/config.yaml
              subPath: config.yaml
      volumes:
        - name: config
          configMap:
            name: {{ include "burble.agentgateway.fullname" . }}
{{- end }}
