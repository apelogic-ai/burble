{{- if .Values.externalSecret.enabled -}}
apiVersion: {{ .Values.externalSecret.apiVersion }}
kind: ExternalSecret
metadata:
  name: {{ include "burble.fullname" . }}
  labels:
    {{- include "burble.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ required "externalSecret.secretStoreRef.name is required" .Values.externalSecret.secretStoreRef.name }}
    kind: {{ .Values.externalSecret.secretStoreRef.kind }}
  target:
    name: {{ include "burble.secretName" . }}
    creationPolicy: Owner
  data:
    {{- toYaml (required "externalSecret.data is required when externalSecret.enabled=true" .Values.externalSecret.data) | nindent 4 }}
{{- end }}
