{{- if eq .Values.litellm.mode "managed" -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "burble.litellm.fullname" . }}
  labels:
    {{- include "burble.labels" . | nindent 4 }}
    app.kubernetes.io/component: litellm
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.litellm.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ include "burble.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: litellm
{{- end }}
