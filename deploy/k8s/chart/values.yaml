# Burble Kubernetes deployment blueprint.
#
# Keep this file generic. Client-specific image refs, hostnames, secret-store
# refs, Slack/GitHub OAuth credentials, and provider keys belong in the
# consumer's private overlay.

image:
  repository: ""
  tag: ""
  digest: ""
  pullPolicy: IfNotPresent
imagePullSecrets: []

replicaCount: 1

config:
  baseUrl: ""
  databasePath: /data/burble.db
  slackLogLevel: info
  agentMode: llm
  agentFastTrack: "false"
  agentRuntime: burble-runtime
  agentRuntimeFactory: static
  agentRuntimeEngine: ""
  agentRuntimeAllowedEngines: ""
  agentRuntimeImage: ""
  agentRuntimeDataRoot: /data/runtimes
  agentRuntimeDockerNetwork: ""
  agentRuntimeIdleTtlMs: "86400000"
  agentRuntimeReaperEnabled: "true"
  agentRuntimeReaperIntervalMs: "60000"
  agentRuntimeJwtTtlSeconds: "604800"
  agentRuntimeToolGatewayUrl: ""
  agentRuntimeMcpGatewayUrl: ""
  agentRuntimeMcpAudience: ""
  agentRuntimeStreaming: native
  agentRuntimeUrl: ""
  agentRuntimeInferenceBaseUrl: ""
  agentRuntimeSandboxUrl: ""
  agentRuntimeSandboxTransport: cli
  agentRuntimeSandboxStartCommand: ""
  agentRuntimeOpenShellCliBin: ""
  agentRuntimeOpenShellDialHost: ""
  agentRuntimeConfigPatchHostPath: ""
  aiModel: openai:gpt-5.4
  atlassianMcpUrl: https://mcp.atlassian.com/v1/mcp
  runtimeJwtIssuer: ""
  runtimeJwtPrivateKeyPath: /data/runtime-jwt-private.pem
  observabilityJsonlPath: ""
  observabilityJsonlDir: /data/observability/events
  observabilityIncludeContent: "false"
  taskWorkflowShadowEnabled: "false"
  taskWorkflowShadowDatabasePath: ""
  taskWorkflowAuthority: off
  taskWorkflowMaxAttempts: "2"
  scheduledRunAuditRetentionDays: "90"
  scheduledRunAuditPruneIntervalMs: "86400000"
  openClawNemoClawUrl: ""
  openClawNemoClawEngine: deterministic
  openClawCommand: openclaw
  openClawAgent: main
  openClawTimeoutMs: "60000"
  openClawStateDir: /data/openclaw/state
  openClawConfigPath: /data/openclaw/config/openclaw.json
  openClawWorkspaceDir: /data/openclaw/workspace
  openClawSetupOnStart: "true"
  openClawConfigPatchPath: ""
  openClawValidateOnStart: "true"
  openClawStreamDebug: "false"
  openClawLogLevel: ""
  openClawDiagnostics: ""
  openClawDebugModelTransport: ""
  openClawDebugModelPayload: ""
  openClawDebugSse: ""
  openClawDebugCodeMode: ""
  openClawCodeMode: "false"
  openClawModelApi: openai-responses
  openClawFastMode: "false"
  openClawRawStreamDebug: "false"
  openClawGatewayPort: "18789"
  openClawGatewayBind: loopback
  openClawGatewayToken: ""
  ollamaBaseUrl: https://ollama.com

secret:
  existingSecret: ""
  optionalKeys: true

externalSecret:
  enabled: false
  apiVersion: external-secrets.io/v1
  secretStoreRef:
    name: ""
    kind: ClusterSecretStore
  refreshInterval: 1h
  data: []
  # Example:
  # - secretKey: SLACK_BOT_TOKEN
  #   remoteRef:
  #     key: burble/slack
  #     property: botToken

persistence:
  enabled: true
  existingClaim: ""
  storageClassName: ""
  accessModes: ["ReadWriteOnce"]
  size: 20Gi

serviceAccount:
  create: true
  name: ""
  annotations: {}

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

litellm:
  # managed: deploy the included LiteLLM proxy.
  # external: point Burble at a client-managed LiteLLM/OpenAI-compatible URL.
  # disabled: leave LLM_GW_BASE_URL/BURBLE_INFERENCE_BASE_URL unset.
  mode: disabled
  externalBaseUrl: ""
  image:
    repository: ghcr.io/berriai/litellm
    tag: v1.92.0
    digest: ""
    pullPolicy: IfNotPresent
  service:
    port: 4000
  config: |
    model_list: []
    litellm_settings:
      drop_params: true
    general_settings:
      store_model_in_db: false
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

agentgateway:
  # managed: deploy the included agentgateway service.
  # external: point Burble at a client-managed agentgateway MCP endpoint.
  # disabled: use Burble's direct internal MCP endpoint.
  mode: disabled
  externalUrl: ""
  image:
    repository: ghcr.io/agentgateway/agentgateway
    tag: v1.1.0
    digest: ""
    pullPolicy: IfNotPresent
  service:
    port: 3000
  publicResourceUrl: ""
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 512Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  capabilities:
    drop: ["ALL"]

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

networkPolicy:
  enabled: true
  ingressFrom: []
  egress:
    dnsEnabled: true
    allowHttpsCidrs: []
    extra: []

podDisruptionBudget:
  enabled: true
  minAvailable: 1

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

podAnnotations: {}
nameOverride: ""
fullnameOverride: ""
nodeSelector: {}
tolerations: []
affinity: {}
